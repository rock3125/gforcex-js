<!DOCTYPE html>
<html lang="en">
<head>
    <title>G-Force X</title>
    <script type="text/javascript" src="cookie.js"></script>
    <script type="text/javascript" src="const.js"></script>
    <script type="text/javascript" src="sound.js"></script>
    <script type="text/javascript" src="orb.js"></script>
    <script type="text/javascript" src="map.js"></script>
    <script type="text/javascript" src="ship.js"></script>
    <script type="text/javascript" src="turret.js"></script>
    <link rel="stylesheet" href="main.css">
</head>
<body>
<div id="gameOver">GAME OVER</div>
<div id="nextLevel">NEXT LEVEL</div>
<div id="allOrbs">ALL ORBS COLLECTED!</div>
<div class="hud">
    ROCK'S G-FORCE X<br/><br/>
    SCORE: <span id="score">0</span><br/>
    FUEL:<br/>
    AMMO:<br/><br/>
    LIVES:<br/>
</div>
<div class="controls-legend">
    <div class="control-item"><span class="key">&#8592;</span> <span class="key">&#8594;</span> Rotate</div>
    <div class="control-item"><span class="key">&#8595;</span> Thrust</div>
    <div class="control-item"><span class="key">Space</span> Fire</div>
    <div class="control-item"><span class="key">M</span> <span id="music"> Music on/off</span></div>
    <div id="restart" class="control-item" style="display: none;"><span class="key">R</span> Restart</div>
</div>
<canvas id="gameCanvas"></canvas>
<canvas id="minimap" width="150" height="150"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const mCanvas = document.getElementById('minimap');
    const mCtx = mCanvas.getContext('2d');
    const score_ctrl = document.getElementById('score');

    // keyboard map (key: string -> boolean)
    let keys = {};
    let gameOver = false;
    const ship = new Ship();     // you, the player
    const player = new Player(); // audio player

    // set up a map with initial turrets and orbs
    let num_turrets = 4;
    let num_orbs = 6;
    let map = new Map(num_turrets, num_orbs);

    /**
     * restart a game - reset lives, score and screen status
     */
    function restart() {
        gameOver = false;
        keys = {};

        // the order of these calls statements is important
        let success = false; // re-create the world until it is right
        while (!success) {
            map.generateWorld();
            success = ship.reset(map); // returns true if we could place the player
            map.placeTurrets(ship)
            map.placeOrbs(ship)
        }

        ship.lives = 3
        ship.score = 0
        document.getElementById('gameOver').style.display = 'none'
        document.getElementById('restart').style.display = 'none'
        document.getElementById('nextLevel').style.display = 'none'
        document.getElementById('allOrbs').style.display = 'none'
    }

    /**
     * you lose / crash / ran out of fuel
     */
    function triggerGameOver() {
        if (gameOver) return;
        gameOver = true;

        // Launch the particles at the ship's current location
        ship.createExplosion();
        ship.lives -= 1

        setTimeout(() => {
            gameOver = ship.lives <= 0;
            if (!gameOver) {
                ship.reset(map);
            }
        }, 1500);
    }

    /**
     * move to the next level
     */
    function triggerNextLevel() {
        document.getElementById('nextLevel').style.display = 'block'
        if (map.collected_all_orbs()) {
            document.getElementById('allOrbs').style.display = 'block'
        }
        setTimeout(() => {
            // reset the level, and carry across our score to the next level
            let old_score = ship.score;
            // add score for reaching the next level
            if (map.collected_all_orbs()) {
                old_score += NEXT_LEVEL_SCORE_FULL;
            } else {
                old_score += NEXT_LEVEL_SCORE;
            }
            const old_lives = ship.lives + 1;       // 1 extra live

            // create the next level
            num_turrets += 2; // two more turrets
            num_orbs += 2;    // and two more orbs
            map = new Map(num_turrets, num_orbs);

            restart();

            // keep score and lives as set above
            ship.score = old_score;
            ship.lives = old_lives;

        }, 2500);
    }

    /**
     * Game main update loop (all logic)
     */
    function update() {
        ship.update(map, keys, player);
        map.update(ship);
        player.sound_check_keys(keys);
        if (gameOver && ship.lives <= 0) {
            document.getElementById('gameOver').style.display = 'block'
            document.getElementById('restart').style.display = 'block'
            if (keys['KeyR']) {
                restart()
            }
        }
    }

    /**
     * Game main draw loop (all drawing / graphics)
     */
    function draw() {
        map.draw(ctx, mCtx, ship);
        // set the player's score as a number inside HTML
        score_ctrl.innerText = ship.score.toLocaleString()
    }

    // the main loop running
    function loop() {
        update();
        draw();

        // The frequency of calls to the callback function will generally match the display refresh rate.
        // The most common refresh rate is 60hz, (60 cycles/frames per second), though 75hz, 120hz, and 144hz
        // are also widely used. requestAnimationFrame() calls are paused in most browsers when running in
        // background tabs in order to improve performance and battery life.
        requestAnimationFrame(loop);
    }

    // set up keyboard processing
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    // set up screen resize logic
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    });
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    // music cookie (just in case it wasn't yet set)
    set_cookie("title_music", player.music_on ? "on" : "off", 7);

    // restart (first start) game logic
    restart();
    // loop forever
    loop();
</script>

</body>
</html>
